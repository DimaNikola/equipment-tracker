<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Учёт инструмента · Склад</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Официальные библиотеки Firebase (compat-сборка, не требует сборщика/модулей) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  :root{
    --bg:#14171c;
    --bg-soft:#191d24;
    --surface:#1f242c;
    --surface-2:#262c35;
    --border:#313846;
    --border-soft:#262c35;
    --text:#eef0f3;
    --text-dim:#9aa3b2;
    --text-faint:#6b7280;
    --accent:#f2a93b;
    --accent-strong:#ffbf5c;
    --accent-dim:#4a3b1d;
    --success:#49c08b;
    --success-bg:rgba(73,192,139,0.12);
    --danger:#ef6461;
    --danger-bg:rgba(239,100,97,0.12);
    --steel:#7fa8c9;
    --teal:#5fc9c0;
    --radius:14px;
    --shadow:0 8px 24px rgba(0,0,0,0.35);
    --font-display:'Oswald',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(242,169,59,0.06), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(127,168,201,0.05), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  ::selection{background:var(--accent);color:#1a1306;}

  a{color:var(--accent-strong);}

  :focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
    border-radius:4px;
  }

  /* ---------- Верхний баннер ошибок ---------- */
  #errorBanner{
    display:none;
    position:sticky;
    top:0;
    z-index:60;
    background:#3a1414;
    color:#ffd9d6;
    border-bottom:1px solid #5c1f1f;
    padding:10px 20px;
    font-size:13px;
    text-align:center;
    font-family:var(--font-mono);
  }
  #errorBanner.show{display:block;}

  /* ---------- Шапка ---------- */
  header.topbar{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(20,23,28,0.86);
    backdrop-filter:blur(10px) saturate(140%);
    -webkit-backdrop-filter:blur(10px) saturate(140%);
    border-bottom:1px solid var(--border-soft);
  }

  .topbar-inner{
    max-width:1280px;
    margin:0 auto;
    padding:16px 24px;
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-right:auto;
  }

  .brand-mark{
    width:38px;
    height:38px;
    border-radius:10px;
    background:linear-gradient(155deg,var(--accent),#c97f1a);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    box-shadow:0 4px 14px rgba(242,169,59,0.25);
  }

  .brand-mark svg{width:20px;height:20px;}

  .brand-text h1{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:600;
    letter-spacing:0.02em;
    margin:0;
    line-height:1.1;
  }

  .brand-text .brand-sub{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:0.08em;
    text-transform:uppercase;
  }

  .conn-dot-row{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
    margin-top:2px;
  }

  .conn-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--text-faint);
    transition:background .25s ease, box-shadow .25s ease;
  }
  .conn-dot.online{background:var(--success);box-shadow:0 0 0 3px var(--success-bg);}
  .conn-dot.offline{background:var(--danger);box-shadow:0 0 0 3px var(--danger-bg);}

  .search-wrap{
    position:relative;
    flex:1 1 260px;
    max-width:360px;
  }

  .search-wrap svg{
    position:absolute;
    left:12px;top:50%;
    transform:translateY(-50%);
    width:16px;height:16px;
    color:var(--text-faint);
    pointer-events:none;
  }

  #searchInput{
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    font-family:var(--font-body);
    font-size:14px;
    padding:10px 14px 10px 36px;
    border-radius:10px;
    transition:border-color .2s ease, background .2s ease;
  }
  #searchInput::placeholder{color:var(--text-faint);}
  #searchInput:focus{border-color:var(--accent);background:var(--surface-2);}

  .auth-btn{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--font-body);
    font-weight:600;
    font-size:13px;
    color:var(--text);
    background:var(--surface);
    border:1px solid var(--border);
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    transition:all .2s ease;
    white-space:nowrap;
  }
  .auth-btn:hover{border-color:var(--text-faint);}
  .auth-btn svg{width:16px;height:16px;flex-shrink:0;}
  .auth-btn.authorized{
    background:var(--accent-dim);
    border-color:var(--accent);
    color:var(--accent-strong);
  }

  /* ---------- Статистика ---------- */
  .stats-row{
    max-width:1280px;
    margin:0 auto;
    padding:18px 24px 4px;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }

  .stat-card{
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:12px;
    padding:12px 18px;
    min-width:130px;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .stat-card .num{
    font-family:var(--font-display);
    font-size:24px;
    font-weight:600;
  }
  .stat-card .label{
    font-size:11px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .stat-card.garage .num{color:var(--steel);}
  .stat-card.office .num{color:var(--accent-strong);}
  .stat-card.object .num{color:var(--teal);}

  /* ---------- Сетка карточек ---------- */
  main{
    max-width:1280px;
    margin:0 auto;
    padding:8px 24px 60px;
  }

  #equipmentGrid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(258px, 1fr));
    gap:16px;
    margin-top:18px;
  }

  .card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:var(--shadow);
    transition:border-color .2s ease, transform .2s ease;
  }
  .card:hover{border-color:var(--border);transform:translateY(-2px);}

  .card-media{
    position:relative;
    width:100%;
    aspect-ratio:16/10;
    background:
      repeating-linear-gradient(135deg, var(--bg-soft) 0 10px, var(--surface) 10px 20px);
    display:flex;
    align-items:center;
    justify-content:center;
    border-bottom:1px dashed var(--border);
  }
  .card-media img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .card-media--empty svg{
    width:34px;height:34px;
    color:var(--text-faint);
    opacity:0.55;
  }

  .grommet{
    position:absolute;
    top:12px;left:12px;
    width:14px;height:14px;
    border-radius:50%;
    background:var(--bg);
    border:1px solid var(--border);
    box-shadow:inset 0 1px 2px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.04);
    z-index:2;
  }

  .card-id{
    position:absolute;
    top:10px;right:10px;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.05em;
    color:var(--text-dim);
    background:rgba(20,23,28,0.72);
    border:1px solid var(--border);
    padding:3px 8px;
    border-radius:6px;
    z-index:2;
  }

  .card-body{
    padding:14px 16px 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
    flex:1;
  }

  .card-eyebrow{
    font-family:var(--font-body);
    font-weight:600;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:var(--steel);
  }

  .card-title{
    font-family:var(--font-display);
    font-size:17px;
    font-weight:500;
    line-height:1.25;
    margin:0;
    display:flex;
    align-items:baseline;
    gap:8px;
    flex-wrap:wrap;
  }

  .qty-badge{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--accent-strong);
    background:var(--accent-dim);
    border:1px solid rgba(242,169,59,0.35);
    padding:1px 7px;
    border-radius:6px;
  }

  .note-input{
    width:100%;
    background:var(--bg-soft);
    border:1px solid var(--border-soft);
    color:var(--text-dim);
    font-family:var(--font-body);
    font-size:12.5px;
    padding:8px 10px;
    border-radius:8px;
    resize:none;
    transition:border-color .2s ease, color .2s ease;
  }
  .note-input:read-only{
    cursor:not-allowed;
    color:var(--text-faint);
  }
  .note-input:not(:read-only):focus{
    border-color:var(--accent);
    color:var(--text);
  }

  .card-footer{
    margin-top:auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding-top:8px;
    border-top:1px dashed var(--border-soft);
  }

  /* 3-позиционный слайдер местонахождения: Гараж / Офис / Объект */
  .loc-toggle{
    position:relative;
    display:flex;
    width:100%;
    background:var(--bg-soft);
    border:1px solid var(--border-soft);
    border-radius:10px;
    padding:3px;
  }
  .loc-thumb{
    position:absolute;
    top:3px;
    left:3px;
    width:calc((100% - 6px) / 3);
    height:calc(100% - 6px);
    border-radius:7px;
    background:var(--steel);
    transition:transform .25s cubic-bezier(.4,0,.2,1), background .25s ease;
    z-index:1;
  }
  .loc-toggle[data-loc="1"] .loc-thumb{ transform:translateX(100%); background:var(--accent); }
  .loc-toggle[data-loc="2"] .loc-thumb{ transform:translateX(200%); background:var(--teal); }

  .loc-opt{
    position:relative;
    z-index:2;
    flex:1;
    border:none;
    background:transparent;
    color:var(--text-faint);
    font-family:var(--font-body);
    font-weight:600;
    font-size:11px;
    letter-spacing:0.01em;
    padding:8px 4px;
    border-radius:7px;
    cursor:pointer;
    transition:color .2s ease;
    white-space:nowrap;
  }
  .loc-opt.active{color:#0c0f13;}
  .loc-opt:hover:not(.active){color:var(--text-dim);}

  body.locked .loc-toggle{opacity:0.55;}
  body.locked .loc-opt{cursor:not-allowed;}

  /* ---------- Пустое состояние / загрузка ---------- */
  .empty-state, .loading-state{
    grid-column:1/-1;
    text-align:center;
    padding:60px 20px;
    color:var(--text-faint);
    font-family:var(--font-body);
  }
  .loading-state .spinner{
    width:28px;height:28px;
    border-radius:50%;
    border:3px solid var(--border);
    border-top-color:var(--accent);
    margin:0 auto 14px;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Модальное окно ПИН ---------- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(8,9,11,0.65);
    backdrop-filter:blur(3px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.show{display:flex;}

  .modal-panel{
    width:100%;
    max-width:340px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:26px 24px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
    animation:pop .18s ease;
  }
  @keyframes pop{from{transform:scale(0.95);opacity:0;}to{transform:scale(1);opacity:1;}}
  .modal-panel.shake{animation:shake .35s ease;}
  @keyframes shake{
    10%,90%{transform:translateX(-2px);}
    20%,80%{transform:translateX(4px);}
    30%,50%,70%{transform:translateX(-7px);}
    40%,60%{transform:translateX(7px);}
  }

  .modal-icon{
    width:42px;height:42px;
    border-radius:12px;
    background:var(--accent-dim);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:14px;
  }
  .modal-icon svg{width:20px;height:20px;color:var(--accent-strong);}

  .modal-panel h2{
    font-family:var(--font-display);
    font-size:18px;
    font-weight:600;
    margin:0 0 6px;
  }
  .modal-panel p{
    font-size:13px;
    color:var(--text-dim);
    margin:0 0 18px;
    line-height:1.4;
  }

  #pinInput{
    width:100%;
    background:var(--bg-soft);
    border:1px solid var(--border);
    color:var(--text);
    font-family:var(--font-mono);
    font-size:22px;
    letter-spacing:0.5em;
    text-align:center;
    padding:12px 10px;
    border-radius:10px;
    transition:border-color .2s ease;
  }
  #pinInput:focus{border-color:var(--accent);}

  .pin-error{
    color:var(--danger);
    font-size:12.5px;
    margin-top:8px;
    min-height:16px;
    font-family:var(--font-body);
  }

  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  .modal-actions button{
    flex:1;
    font-family:var(--font-body);
    font-weight:600;
    font-size:13.5px;
    padding:10px 0;
    border-radius:9px;
    cursor:pointer;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text-dim);
    transition:all .2s ease;
  }
  .modal-actions button.primary{
    background:var(--accent);
    border-color:var(--accent);
    color:#1a1306;
  }
  .modal-actions button.primary:hover{background:var(--accent-strong);}
  .modal-actions button:not(.primary):hover{border-color:var(--text-faint);color:var(--text);}

  /* ---------- Тосты ---------- */
  #toastContainer{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:200;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:center;
    pointer-events:none;
  }
  .toast{
    font-family:var(--font-body);
    font-size:13px;
    font-weight:500;
    padding:10px 18px;
    border-radius:10px;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    opacity:0;
    transform:translateY(8px);
    animation:toastIn .2s ease forwards, toastOut .2s ease 2.2s forwards;
  }
  .toast.success{border-color:rgba(73,192,139,0.5);color:var(--success);}
  .toast.warn{border-color:rgba(242,169,59,0.5);color:var(--accent-strong);}
  .toast.error{border-color:rgba(239,100,97,0.5);color:var(--danger);}
  @keyframes toastIn{to{opacity:1;transform:translateY(0);}}
  @keyframes toastOut{to{opacity:0;transform:translateY(8px);}}

  footer{
    text-align:center;
    padding:30px 20px 40px;
    color:var(--text-faint);
    font-family:var(--font-mono);
    font-size:11.5px;
    letter-spacing:0.03em;
  }

  @media (max-width:560px){
    .topbar-inner{padding:14px 16px;}
    .search-wrap{max-width:none;flex-basis:100%;order:3;}
    main{padding:8px 16px 50px;}
    .stats-row{padding:16px 16px 0;}
  }
</style>
</head>
<body class="locked">

<div id="errorBanner"></div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1306" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <div class="brand-text">
        <h1>Учёт инструмента</h1>
        <div class="conn-dot-row">
          <span class="conn-dot" id="connDot"></span>
          <span id="connText">Подключение…</span>
        </div>
      </div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Поиск по названию или категории…" autocomplete="off">
    </div>

    <button class="auth-btn" id="authBtn" type="button" aria-label="Авторизация по ПИН-коду">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      <span>Войти по ПИН-коду</span>
    </button>
  </div>
</header>

<div class="stats-row">
  <div class="stat-card">
    <div class="num" id="statTotal">—</div>
    <div class="label">Всего позиций</div>
  </div>
  <div class="stat-card garage">
    <div class="num" id="statGarage">—</div>
    <div class="label">Гараж</div>
  </div>
  <div class="stat-card office">
    <div class="num" id="statOffice">—</div>
    <div class="label">Офис</div>
  </div>
  <div class="stat-card object">
    <div class="num" id="statObject">—</div>
    <div class="label">Объект</div>
  </div>
</div>

<main>
  <div id="equipmentGrid">
    <div class="loading-state">
      <div class="spinner"></div>
      Загрузка данных из Firebase…
    </div>
  </div>
</main>

<footer>
  СИСТЕМА УЧЁТА ИНСТРУМЕНТА · FIREBASE REALTIME DATABASE
</footer>

<!-- Модальное окно ввода ПИН-кода -->
<div class="modal-overlay" id="pinOverlay">
  <div class="modal-panel" id="pinPanel">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    </div>
    <h2>Авторизация</h2>
    <p>Введите ПИН-код, чтобы разблокировать переключатели статуса и комментарии оборудования.</p>
    <form id="pinForm" autocomplete="off">
      <input type="password" id="pinInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" autocomplete="off">
      <div class="pin-error" id="pinError"></div>
      <div class="modal-actions">
        <button type="button" id="pinCancelBtn">Отмена</button>
        <button type="submit" class="primary">Войти</button>
      </div>
    </form>
  </div>
</div>

<div id="toastContainer"></div>

<script>
  /* =========================================================
     КОНФИГУРАЦИЯ FIREBASE
     authDomain и databaseURL дополнены до корректного формата
     на основе projectId "my-equipment-monitor" — в исходных
     значениях, переданных для вставки, они были без протокола
     и поддомена проекта.
  ========================================================== */
  const firebaseConfig = {
    apiKey: "AIzaSyArylMiD5eXHIMeXeXuRYgqOsa89Q7wTIM",
    authDomain: "my-equipment-monitor.firebaseapp.com",
    databaseURL: "https://my-equipment-monitor-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "my-equipment-monitor",
    storageBucket: "my-equipment-monitor.firebasestorage.app",
    messagingSenderId: "239407646772",
    appId: "1:239407646772:web:378227772b5521983c6261"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const equipmentRef = db.ref("equipment");
  const connectedRef = db.ref(".info/connected");

  const CORRECT_PIN = "7777";

  /* Три положения слайдера местонахождения. Индекс хранится в поле
     "location" каждой позиции оборудования: 0 = Гараж, 1 = Офис, 2 = Объект. */
  const LOCATIONS = ["Гараж", "Офис", "Объект"];

  /* =========================================================
     ИСХОДНЫЙ СПИСОК ИЗ 25 ЕДИНИЦ ОБОРУДОВАНИЯ
     Используется только один раз — для первичного заполнения
     базы данных, если узел "equipment" ещё пуст.
  ========================================================== */
  const DEFAULT_EQUIPMENT = [
    { id:"item01", number:1,  name:"Осушитель воздуха Jax",                 category:"Осушители воздуха",     img:"", quantity:1, location:0,  note:"" },
    { id:"item02", number:2,  name:"Осушитель воздуха MASTER dh26",         category:"Осушители воздуха",     img:"", quantity:1, location:0,  note:"" },
    { id:"item03", number:3,  name:"Осушитель воздуха MASTER dhp65 (урна)", category:"Осушители воздуха",     img:"", quantity:1, location:0,  note:"" },
    { id:"item04", number:4,  name:"Осушитель воздуха MASTER dh752",        category:"Осушители воздуха",     img:"", quantity:1, location:0,  note:"" },
    { id:"item05", number:5,  name:"Вентилятор промышленный №1",            category:"Вентиляторы",           img:"", quantity:1, location:0,  note:"" },
    { id:"item06", number:6,  name:"Вентилятор промышленный №2",            category:"Вентиляторы",           img:"", quantity:1, location:0,  note:"" },
    { id:"item07", number:7,  name:"Улитка малая",                         category:"Улитки",                img:"", quantity:1, location:0,  note:"" },
    { id:"item08", number:8,  name:"Улитка большая",                       category:"Улитки",                img:"", quantity:1, location:0,  note:"" },
    { id:"item09", number:9,  name:"Пылесос DEXP большой",                 category:"Пылесосы",              img:"", quantity:1, location:0,  note:"" },
    { id:"item10", number:10, name:"Пылесос DEXP малый",                   category:"Пылесосы",              img:"", quantity:1, location:0,  note:"" },
    { id:"item11", number:11, name:"Насос",                                category:"Насосы",                img:"", quantity:3, location:0,  note:"" },
    { id:"item12", number:12, name:"АГП-1",                                category:"Прочее оборудование",   img:"", quantity:1, location:0,  note:"" },
    { id:"item13", number:13, name:"Тепловизор",                           category:"Прочее оборудование",   img:"", quantity:1, location:0,  note:"" },
    { id:"item14", number:14, name:"Тестер поиска протечки",               category:"Прочее оборудование",   img:"", quantity:1, location:0,  note:"" },
    { id:"item15", number:15, name:"Осушитель воздуха (чёрный, Китай)",    category:"Осушители воздуха",     img:"", quantity:1, location:0,  note:"" },
    { id:"item16", number:16, name:"Водосгон",                             category:"Прочее оборудование",   img:"", quantity:1, location:0,  note:"" },
    { id:"item17", number:17, name:"Вентилятор маленький",                 category:"Вентиляторы",           img:"", quantity:1, location:0,  note:"" },
    { id:"item18", number:18, name:"Шаблон 1",                             category:"Шаблон / Резерв",       img:"", quantity:1, location:0,  note:"" },
    { id:"item19", number:19, name:"Шаблон 2",                             category:"Шаблон / Резерв",       img:"", quantity:1, location:0,  note:"" },
    { id:"item20", number:20, name:"Шаблон 3",                             category:"Шаблон / Резерв",       img:"", quantity:1, location:0,  note:"" },
    { id:"item21", number:21, name:"Шаблон 4",                             category:"Шаблон / Резерв",       img:"", quantity:1, location:0,  note:"" },
    { id:"item22", number:22, name:"Шаблон 5",                             category:"Шаблон / Резерв",       img:"", quantity:1, location:0,  note:"" },
    { id:"item23", number:23, name:"Шаблон 6",                             category:"Шаблон / Резерв",       img:"", quantity:1, location:0,  note:"" },
    { id:"item24", number:24, name:"Шаблон 7",                             category:"Шаблон / Резерв",       img:"", quantity:1, location:0,  note:"" },
    { id:"item25", number:25, name:"Шаблон 8",                             category:"Шаблон / Резерв",       img:"", quantity:1, location:0,  note:"" }
  ];
  // ВАЖНО: для позиции item01 (Осушитель воздуха Jax) ссылка на фото
  // из ВКонтакте не была передана и поэтому оставлена пустой ("").
  // Вставьте её вручную в это поле, либо позже в самой базе данных.

  /* =========================================================
     СОСТОЯНИЕ ПРИЛОЖЕНИЯ
  ========================================================== */
  let equipmentData = {};
  let isAuthorized = false;
  let searchTerm = "";
  let firstLoadDone = false;

  /* =========================================================
     ССЫЛКИ НА DOM-ЭЛЕМЕНТЫ
  ========================================================== */
  const gridEl = document.getElementById("equipmentGrid");
  const searchInput = document.getElementById("searchInput");
  const authBtn = document.getElementById("authBtn");
  const pinOverlay = document.getElementById("pinOverlay");
  const pinPanel = document.getElementById("pinPanel");
  const pinForm = document.getElementById("pinForm");
  const pinInput = document.getElementById("pinInput");
  const pinError = document.getElementById("pinError");
  const pinCancelBtn = document.getElementById("pinCancelBtn");
  const toastContainer = document.getElementById("toastContainer");
  const errorBanner = document.getElementById("errorBanner");
  const connDot = document.getElementById("connDot");
  const connText = document.getElementById("connText");
  const statTotal = document.getElementById("statTotal");
  const statGarage = document.getElementById("statGarage");
  const statOffice = document.getElementById("statOffice");
  const statObject = document.getElementById("statObject");

  /* =========================================================
     ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
  ========================================================== */
  function escapeHtml(value){
    return String(value === undefined || value === null ? "" : value).replace(/[&<>"']/g, function(ch){
      return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" })[ch];
    });
  }

  const WRENCH_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>';

  function showToast(message, type){
    const el = document.createElement("div");
    el.className = "toast" + (type ? " " + type : "");
    el.textContent = message;
    toastContainer.appendChild(el);
    setTimeout(function(){ el.remove(); }, 2600);
  }

  function showErrorBanner(message){
    errorBanner.textContent = message;
    errorBanner.classList.add("show");
  }

  /* =========================================================
     ЗАГРУЗКА / ПЕРВИЧНОЕ ЗАПОЛНЕНИЕ БАЗЫ ДАННЫХ
  ========================================================== */
  function initializeData(){
    equipmentRef.once("value").then(function(snapshot){
      if (!snapshot.exists()){
        const seed = {};
        DEFAULT_EQUIPMENT.forEach(function(item){ seed[item.id] = item; });
        return equipmentRef.set(seed);
      }
    }).catch(function(err){
      console.error("Ошибка первичного заполнения базы данных:", err);
      showErrorBanner("Не удалось записать данные в Firebase. Проверьте правила доступа Realtime Database.");
    }).finally(function(){
      equipmentRef.on("value", function(snapshot){
        equipmentData = snapshot.val() || {};
        firstLoadDone = true;
        refreshView();
      }, function(err){
        console.error("Ошибка чтения базы данных:", err);
        showErrorBanner("Не удалось подключиться к Firebase Realtime Database. Проверьте конфигурацию firebaseConfig и правила доступа.");
      });
    });
  }

  connectedRef.on("value", function(snapshot){
    const online = snapshot.val() === true;
    connDot.classList.toggle("online", online);
    connDot.classList.toggle("offline", !online);
    connText.textContent = online ? "Подключено" : "Нет соединения";
  });

  /* =========================================================
     ОТРИСОВКА
  ========================================================== */
  function getFilteredSortedItems(){
    const term = searchTerm.trim().toLowerCase();
    return Object.keys(equipmentData).map(function(id){
      return Object.assign({ id: id }, equipmentData[id]);
    }).filter(function(item){
      if (!term) return true;
      const name = (item.name || "").toLowerCase();
      const category = (item.category || "").toLowerCase();
      return name.indexOf(term) !== -1 || category.indexOf(term) !== -1;
    }).sort(function(a, b){
      return (a.number || 0) - (b.number || 0);
    });
  }

  function cardTemplate(item){
    const idLabel = "№ " + String(item.number || 0).padStart(2, "0");
    const mediaHtml = item.img
      ? '<img src="' + escapeHtml(item.img) + '" alt="' + escapeHtml(item.name) + '" loading="lazy">'
      : '<div class="card-media--empty">' + WRENCH_ICON + '</div>';
    const qtyBadge = item.quantity && item.quantity > 1
      ? '<span class="qty-badge">× ' + escapeHtml(item.quantity) + '</span>'
      : "";

    // Местонахождение: 0 = Гараж, 1 = Офис, 2 = Объект. Для записей,
    // созданных до появления этого поля, по умолчанию считаем "Гараж".
    const locIndex = (typeof item.location === "number" && item.location >= 0 && item.location <= 2) ? item.location : 0;
    const locOptionsHtml = LOCATIONS.map(function(label, idx){
      const activeClass = idx === locIndex ? " active" : "";
      return '<button type="button" class="loc-opt' + activeClass + '" data-loc="' + idx + '">' + escapeHtml(label) + '</button>';
    }).join("");

    return (
      '<div class="card" data-id="' + escapeHtml(item.id) + '">' +
        '<div class="card-media">' +
          '<span class="grommet" aria-hidden="true"></span>' +
          '<span class="card-id">' + idLabel + '</span>' +
          mediaHtml +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-eyebrow">' + escapeHtml(item.category) + '</div>' +
          '<h3 class="card-title">' + escapeHtml(item.name) + qtyBadge + '</h3>' +
          '<textarea class="note-input" rows="2" placeholder="Комментарий / место хранения…" readonly>' + escapeHtml(item.note) + '</textarea>' +
          '<div class="card-footer">' +
            '<div class="loc-toggle" data-loc="' + locIndex + '">' +
              '<span class="loc-thumb"></span>' +
              locOptionsHtml +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  function renderGrid(){
    const items = getFilteredSortedItems();
    if (!firstLoadDone){
      gridEl.innerHTML = '<div class="loading-state"><div class="spinner"></div>Загрузка данных из Firebase…</div>';
      return;
    }
    if (items.length === 0){
      gridEl.innerHTML = '<div class="empty-state">Ничего не найдено по запросу «' + escapeHtml(searchTerm) + '».</div>';
      return;
    }
    gridEl.innerHTML = items.map(cardTemplate).join("");
  }

  function updateStats(){
    const all = Object.keys(equipmentData).map(function(id){ return equipmentData[id]; });
    const total = all.length;
    const counts = [0, 0, 0];
    all.forEach(function(it){
      const idx = (typeof it.location === "number" && it.location >= 0 && it.location <= 2) ? it.location : 0;
      counts[idx]++;
    });
    statTotal.textContent = total || "0";
    statGarage.textContent = counts[0] || "0";
    statOffice.textContent = counts[1] || "0";
    statObject.textContent = counts[2] || "0";
  }

  function updateAuthUI(){
    document.body.classList.toggle("locked", !isAuthorized);
    document.querySelectorAll(".note-input").forEach(function(el){
      el.readOnly = !isAuthorized;
    });
    authBtn.classList.toggle("authorized", isAuthorized);
    authBtn.innerHTML = isAuthorized
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.4-2"/></svg><span>Заблокировать</span>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><span>Войти по ПИН-коду</span>';
  }

  function refreshView(){
    renderGrid();
    updateStats();
    updateAuthUI();
  }

  /* =========================================================
     ПОИСК
  ========================================================== */
  searchInput.addEventListener("input", function(e){
    searchTerm = e.target.value;
    renderGrid();
    updateAuthUI();
  });

  /* =========================================================
     АВТОРИЗАЦИЯ ПО ПИН-КОДУ
  ========================================================== */
  function openPinModal(){
    pinError.textContent = "";
    pinInput.value = "";
    pinOverlay.classList.add("show");
    setTimeout(function(){ pinInput.focus(); }, 10);
  }

  function closePinModal(){
    pinOverlay.classList.remove("show");
    pinInput.value = "";
    pinError.textContent = "";
  }

  authBtn.addEventListener("click", function(){
    if (isAuthorized){
      isAuthorized = false;
      updateAuthUI();
      showToast("Переключатели заблокированы", "warn");
    } else {
      openPinModal();
    }
  });

  pinCancelBtn.addEventListener("click", closePinModal);

  pinOverlay.addEventListener("click", function(e){
    if (e.target === pinOverlay) closePinModal();
  });

  document.addEventListener("keydown", function(e){
    if (e.key === "Escape" && pinOverlay.classList.contains("show")) closePinModal();
  });

  pinForm.addEventListener("submit", function(e){
    e.preventDefault();
    if (pinInput.value === CORRECT_PIN){
      isAuthorized = true;
      updateAuthUI();
      closePinModal();
      showToast("Доступ разблокирован", "success");
    } else {
      pinError.textContent = "Неверный ПИН-код, попробуйте снова";
      pinPanel.classList.remove("shake");
      void pinPanel.offsetWidth;
      pinPanel.classList.add("shake");
      pinInput.value = "";
      pinInput.focus();
    }
  });

  /* =========================================================
     ВЗАИМОДЕЙСТВИЕ С КАРТОЧКАМИ (делегирование событий)
  ========================================================== */
  gridEl.addEventListener("click", function(e){
    const locBtn = e.target.closest(".loc-opt");
    if (!locBtn) return;

    if (!isAuthorized){
      showToast("Сначала войдите по ПИН-коду, чтобы изменить местонахождение", "warn");
      return;
    }

    const card = e.target.closest(".card");
    const id = card.getAttribute("data-id");
    const newLoc = parseInt(locBtn.getAttribute("data-loc"), 10);

    equipmentRef.child(id).update({ location: newLoc, updatedAt: Date.now() }).then(function(){
      showToast("Местонахождение обновлено: " + LOCATIONS[newLoc], "success");
    }).catch(function(err){
      console.error(err);
      showToast("Не удалось сохранить изменение в базе данных", "error");
    });
  });

  gridEl.addEventListener("focusout", function(e){
    if (!e.target.classList.contains("note-input")) return;
    if (!isAuthorized) return;
    const card = e.target.closest(".card");
    const id = card.getAttribute("data-id");
    equipmentRef.child(id).update({ note: e.target.value }).catch(function(err){
      console.error(err);
      showToast("Не удалось сохранить комментарий", "error");
    });
  });

  /* =========================================================
     ЗАПУСК
  ========================================================== */
  initializeData();
</script>
</body>
</html>
